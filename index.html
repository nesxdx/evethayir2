<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
background:#000;
z-index:-2;
}

.container{
position:relative;
text-align:center;
padding:35px;
background:rgba(0,0,0,.35);
border-radius:25px;
color:#fff;
}

h1{
font-size:clamp(30px,5vw,48px);
margin-bottom:40px;
text-shadow:0 0 10px #000;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:15px;
cursor:pointer;
transition:.2s;
}

#evet{
background:#ff4d88;
color:#fff;
margin-right:20px;
}

#evet:hover{
transform:scale(1.08);
}

#hayir{
position:absolute;
background:#555;
color:#fff;
}
</style>

</head>
<body>

<img src="arka_plan.jpg" class="bg">

<div class="container">
<h1>Benim sevgilim olur musun? 💗</h1>
<button id="evet">Evet 💖</button>
<button id="hayir">Hayır 😅</button>
</div>

<script>
const hayir=document.getElementById("hayir");
const evet=document.getElementById("evet");

function kac(){
const x=Math.random()*(window.innerWidth-hayir.offsetWidth);
const y=Math.random()*(window.innerHeight-hayir.offsetHeight);
hayir.style.left=x+"px";
hayir.style.top=y+"px";
}

hayir.addEventListener("mouseenter",kac);

hayir.addEventListener("touchstart",e=>{
e.preventDefault();
kac();
});

evet.onclick=()=>{
document.body.innerHTML=`
<img src="arka_plan.jpg" class="bg">
<div style="height:100vh;display:flex;justify-content:center;align-items:center;color:white;font-size:42px;text-shadow:2px 2px 8px black;">
❤️🥳<br>Biliyordum! Seni çok seviyorum. 💖
</div>`;
};
</script>

</body>
</html>
